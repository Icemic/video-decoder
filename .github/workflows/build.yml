name: Build

on:
  push:
    branches: [main, test-ci]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ──────────────────────────────────────────────────
          - name: linux-x86_64
            os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            artifact: libmoyu_video.so
            cross: false

          # ── Linux aarch64 (cross-compiled) ────────────────────────────────
          - name: linux-aarch64
            os: ubuntu-24.04
            rust_target: aarch64-unknown-linux-gnu
            artifact: libmoyu_video.so
            cross: true
            apt_packages: clang binutils-aarch64-linux-gnu

          # ── Windows x86_64 (cross-compiled on Ubuntu) ─────────────────────
          - name: windows-x86_64
            os: ubuntu-24.04
            rust_target: x86_64-pc-windows-gnu
            artifact: moyu_video.dll
            cross: true
            apt_packages: gcc-mingw-w64-x86-64

          # ── macOS arm64 ───────────────────────────────────────────
          # - name: macos-arm64
          #   os: macos-14
          #   rust_target: aarch64-apple-darwin
          #   artifact: libmoyu_video.dylib
          #   cross: false

          # ── Android arm64 (cross-compiled) ────────────────────────────────
          # - name: android-arm64
          #   os: ubuntu-24.04
          #   rust_target: aarch64-linux-android
          #   artifact: libmoyu_video.so
          #   cross: true

          # ── iOS arm64 ─────────────────────────────────────────────
          # - name: ios-arm64
          #   os: macos-14
          #   rust_target: aarch64-apple-ios
          #   artifact: libmoyu_video.dylib
          #   cross: true

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      # ── Linux system dependencies ─────────────────────────────────────────
      - name: Install Linux cross-compilation toolchain
        if: runner.os == 'Linux' && matrix.apt_packages != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ${{ matrix.apt_packages }} nasm meson

      - name: Install nasm and meson (Linux)
        if: runner.os == 'Linux' && matrix.apt_packages == ''
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends nasm meson

      - name: Install Rust cross-compilation target
        if: matrix.cross
        run: rustup target add ${{ matrix.rust_target }}

      # ── macOS dependencies ────────────────────────────────────────────────────
      - name: Install nasm and meson (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm meson

      # ── Android NDK setup ─────────────────────────────────────────────────
      - name: Download and install Android NDK
        if: matrix.name == 'android-arm64'
        run: |
          NDK_VERSION="r27d"
          NDK_ZIP="android-ndk-${NDK_VERSION}-linux.zip"
          NDK_URL="https://dl.google.com/android/repository/${NDK_ZIP}"
          NDK_SHA1="22105e410cf29afcf163760cc95522b9fb981121"

          curl -fsSL "$NDK_URL" -o "/tmp/${NDK_ZIP}"
          echo "${NDK_SHA1}  /tmp/${NDK_ZIP}" | sha1sum --check --strict

          unzip -q "/tmp/${NDK_ZIP}" -d "$HOME/android-ndk"
          echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Configure Android NDK toolchain path
        if: matrix.name == 'android-arm64'
        run: |
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "ANDROID_CROSS_PREFIX=${NDK_BIN}/aarch64-linux-android-" >> "$GITHUB_ENV"
          echo "CC=${NDK_BIN}/aarch64-linux-android21-clang"             >> "$GITHUB_ENV"
          echo "AR=${NDK_BIN}/llvm-ar"                                   >> "$GITHUB_ENV"

      # ── Build FFmpeg ──────────────────────────────────────────────────────
      # - name: Build FFmpeg
      #   shell: bash
      #   run: |
      #     bash scripts/build_ffmpeg.sh \
      #       --target "${{ matrix.rust_target }}" \
      #       --install-dir "$PWD/ffmpeg_install_${{ matrix.name }}"

      # - name: Set FFMPEG_INSTALL_DIR environment variable
      #   shell: bash
      #   run: echo "FFMPEG_INSTALL_DIR=$PWD/ffmpeg_install_${{ matrix.name }}" >> "$GITHUB_ENV"

      # ── Build the library ─────────────────────────────────────────────────
      - name: Build moyu_video
        shell: bash
        run: |
          cargo build --release --target "${{ matrix.rust_target }}" -p wrapper

      # ── Collect artifact ──────────────────────────────────────────────────
      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p dist
          SRC="target/${{ matrix.rust_target }}/release/${{ matrix.artifact }}"
          cp "$SRC" "dist/${{ matrix.artifact }}"
          cp wrapper/include/moyu_video.h dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: dist/

  # ── Publish release assets on tagged commits ───────────────────────────────
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: artifacts/**/*
