name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ──────────────────────────────────────────────────
          - name: linux-x86_64
            os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            artifact: libmoyu_video.so
            cross: false

          # ── Linux aarch64 (cross-compiled) ────────────────────────────────
          - name: linux-aarch64
            os: ubuntu-24.04
            rust_target: aarch64-unknown-linux-gnu
            artifact: libmoyu_video.so
            cross: true
            apt_packages: gcc-aarch64-linux-gnu

          # ── Windows x86_64 ────────────────────────────────────────────────
          - name: windows-x86_64
            os: windows-2022
            rust_target: x86_64-pc-windows-gnu
            artifact: moyu_video.dll
            cross: false

          # ── macOS x86_64 ──────────────────────────────────────────────────
          - name: macos-x86_64
            os: macos-13
            rust_target: x86_64-apple-darwin
            artifact: libmoyu_video.dylib
            cross: false

          # ── macOS arm64 ───────────────────────────────────────────
          - name: macos-arm64
            os: macos-14
            rust_target: aarch64-apple-darwin
            artifact: libmoyu_video.dylib
            cross: false

          # ── Android arm64 (cross-compiled) ────────────────────────────────
          - name: android-arm64
            os: ubuntu-24.04
            rust_target: aarch64-linux-android
            artifact: libmoyu_video.so
            cross: true

          # ── iOS arm64 ─────────────────────────────────────────────
          - name: ios-arm64
            os: macos-14
            rust_target: aarch64-apple-ios
            artifact: libmoyu_video.dylib
            cross: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Linux system dependencies ─────────────────────────────────────────
      - name: Install Linux cross-compilation toolchain
        if: runner.os == 'Linux' && matrix.apt_packages != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ${{ matrix.apt_packages }} nasm meson ninja-build

      - name: Install nasm and meson (Linux)
        if: runner.os == 'Linux' && matrix.apt_packages == ''
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends nasm meson ninja-build

      # ── macOS dependencies ────────────────────────────────────────────────────
      - name: Install nasm and meson (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm meson

      # ── Windows dependencies ──────────────────────────────────────────────
      # Use MINGW64 msystem so that C:\msys64\mingw64\bin (gcc, nasm, make) is
      # added to the Windows PATH for all subsequent steps automatically.
      # meson + ninja are installed via pip so they work from any shell.
      - name: Install MSYS2 / MinGW toolchain (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-nasm
            make

      - name: Install meson and ninja (Windows)
        if: runner.os == 'Windows'
        run: pip install meson ninja

      # ── Android NDK setup ─────────────────────────────────────────────────
      - name: Set up Android NDK
        if: matrix.name == 'android-arm64'
        uses: android-actions/setup-android@v3

      - name: Configure Android NDK toolchain path
        if: matrix.name == 'android-arm64'
        run: |
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "ANDROID_CROSS_PREFIX=${NDK_BIN}/aarch64-linux-android-" >> "$GITHUB_ENV"
          echo "CC=${NDK_BIN}/aarch64-linux-android21-clang"             >> "$GITHUB_ENV"
          echo "AR=${NDK_BIN}/llvm-ar"                                   >> "$GITHUB_ENV"

      # ── Rust toolchain ────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      # ── Build FFmpeg ──────────────────────────────────────────────────────
      # The ffmpeg and dav1d repos are not committed as git submodules (no
      # gitlink entries exist). Download specific release tarballs instead.
      - name: Cache FFmpeg installation
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ffmpeg_install_${{ matrix.name }}
          key: ffmpeg-dav1d-${{ matrix.name }}-ffmpeg-n8.0.1-dav1d-1.5.1-${{ hashFiles('scripts/build_ffmpeg.sh') }}

      - name: Download FFmpeg source
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p ffmpeg
          curl -fsSL "https://github.com/FFmpeg/FFmpeg/archive/refs/tags/n8.0.1.tar.gz" \
            | tar -xz --strip-components=1 -C ffmpeg/

      - name: Download dav1d source
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p dav1d
          curl -fsSL "https://github.com/videolan/dav1d/archive/refs/tags/1.5.1.tar.gz" \
            | tar -xz --strip-components=1 -C dav1d/

      - name: Build FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: bash
        run: |
          bash scripts/build_ffmpeg.sh \
            --target "${{ matrix.rust_target }}" \
            --install-dir "$PWD/ffmpeg_install_${{ matrix.name }}"

      - name: Set FFMPEG_INSTALL_DIR and DAV1D_INSTALL_DIR environment variables
        shell: bash
        run: |
          echo "FFMPEG_INSTALL_DIR=$PWD/ffmpeg_install_${{ matrix.name }}" >> "$GITHUB_ENV"
          echo "DAV1D_INSTALL_DIR=$PWD/ffmpeg_install_${{ matrix.name }}/dav1d" >> "$GITHUB_ENV"

      # ── Build the library ─────────────────────────────────────────────────
      - name: Build moyu_video
        shell: bash
        run: |
          cargo build --release --target "${{ matrix.rust_target }}" -p wrapper

      # ── Collect artifact ──────────────────────────────────────────────────
      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p dist
          SRC="target/${{ matrix.rust_target }}/release/${{ matrix.artifact }}"
          cp "$SRC" "dist/${{ matrix.name }}-${{ matrix.artifact }}"
          cp wrapper/include/moyu_video.h dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/
          retention-days: 30

  # ── Publish release assets on tagged commits ───────────────────────────────
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
